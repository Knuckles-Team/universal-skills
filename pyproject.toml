[build-system]
requires = [ "setuptools>=80.9.0", "wheel",]
build-backend = "setuptools.build_meta"

[project]
name = "universal-skills"
version = "1.2.1"
description = "A collection of universal skills for AI agents"
readme = "README.md"
license = "MIT"
classifiers = [ "Development Status :: 5 - Production/Stable", "Environment :: Console", "Operating System :: POSIX :: Linux", "Programming Language :: Python :: 3",]
requires-python = ">=3.11"
dependencies = [ ]

[project.optional-dependencies]
test = [
    "build>=1.5.0",
    # CONCEPT:PHASE2-RECONCILE — capped back under 83. ccxt==4.5.67
    # (emerald-exchange's Phase-1 floor, and the only ccxt release available)
    # hard-pins `setuptools==82.0.1` exactly.
    "setuptools>=80.9.0,<83.0.0",
    "wheel>=0.47.0",
    "pytest-xdist>=3.8.0",
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0", "pytest-cov>=7.1.0",
    "pytest-timeout>=2.4.0",
    "PyYAML>=6.0.3",
    "httpx>=0.28.1"
]
agent-browser = []
agent-builder = ["PyYAML>=6.0.3"]
agent-package-builder = []
agent-spawner = []
