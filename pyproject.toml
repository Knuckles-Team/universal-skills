    "universal-skills[creative-media]>=1.0.0",
    "universal-skills[database-tools]>=1.0.0",
    "universal-skills[developer-utilities]>=1.0.0",
    "universal-skills[document-converter]>=1.0.0",
    "universal-skills[document-tools]>=1.0.0",
    "universal-skills[github-tools]>=1.0.0",
