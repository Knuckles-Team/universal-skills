[project.scripts]
install-universal = "universal_skills.core.universal_installer:main"
install-skills = "universal_skills.core.skill_installer:main"

[[project.authors]]
name = "Repository Maintainers"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
universal_skills = [
    "**/*",
    "**/.*",
    "**/.*/**/*",
]

[tool.setuptools.exclude-package-data]
"*" = [
    "**/__pycache__/*",
    "**/*.pyc",
    "**/*.pyo",
    "**/.DS_Store",
    "**/.pytest_cache/*",
    "**/.mypy_cache/*",
    "**/.ruff_cache/*",
    "**/*.skill",
    "research/comparative-analysis/results/*",
    "research/comparative-analysis/results_*.json",
]

[tool.setuptools.packages.find]
where = [ ".",]
include = [ "universal_skills*",]
namespaces = true

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
asyncio_mode = "auto"
