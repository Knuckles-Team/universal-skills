    "universal-skills[github-tools]>=1.0.0",
    "universal-skills[google-workspace]>=1.0.0",
    "universal-skills[internal-comms]>=1.0.0",
    "universal-skills[product-strategy]>=1.0.0",
    "universal-skills[pre-mortem]>=1.0.0",
