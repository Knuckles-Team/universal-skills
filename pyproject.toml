    "universal-skills[pre-mortem]>=1.0.0",
    "universal-skills[react-development]>=1.0.0",
    "universal-skills[react-native-skills]>=1.0.0",
    "universal-skills[security-tools]>=1.0.0",
    "universal-skills[session-handoff]>=1.0.0",
    "universal-skills[skill-builder]>=1.0.0",
    "universal-skills[skill-catalog-auditor]>=1.0.0",
    "universal-skills[skill-graph-builder]>=1.0.0",
    "universal-skills[skill-workflow-builder]>=1.0.0",
    "universal-skills[universal-installer]>=1.0.0",
