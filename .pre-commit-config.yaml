exclude:
  ^(.*\/scripts\/|.*skill_graphs\/|.*pnpm-lock\.yaml|.*uv\.lock|.*\.db$|.*\.bak$|.*\.sqlite$)
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
  hooks:
  - id: check-added-large-files
    args: ["--maxkb=2000"]
    exclude: ^uv\.lock$|.*\.db$|.*\.bak$|.*\.sqlite$
  - id: check-ast
    exclude: (^|/)(tests/|test/|scripts/|script/)
  - id: check-yaml
    args: ["--unsafe"]
  - id: check-toml
  - id: check-json
  - id: fix-byte-order-marker
    exclude: .gitignore
  - id: check-merge-conflict
  - id: detect-private-key
  - id: trailing-whitespace
  - id: end-of-file-fixer
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: 6fec9b7edb08fd9989088709d864a7826dc74e80 # v0.15.12
  hooks:
  - id: ruff
    name: ruff check
    args: ["--fix", "--ignore=E402"]
    exclude: (^|/)(tests/|test/|scripts/|script/)
  - id: ruff-format
    name: ruff format
    exclude: (^|/)(tests/|test/|scripts/|script/)
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: fc0f09a29bb495f4a91f00266155d6282d52485d # v1.20.2
  hooks:
  - id: mypy
    args: ["--ignore-missing-imports", "--follow-imports=silent", "--show-column-numbers",
      "--no-error-summary", "--no-pretty"]
    exclude: (^|/)(tests/|test/|scripts/|script/)
    additional_dependencies: ["types-PyYAML==6.0.12.20260518", "types-requests==2.33.0.20260518", "types-setuptools==83.0.0.20260706",
      "types-toml==0.10.8.20260518"]
- repo: https://github.com/jendrikseipp/vulture
  rev: b0f67ba0044693aa9ec0d38fe460590facc98004 # v2.16
  hooks:
  - id: vulture
    pass_filenames: false
    args: [".", "--min-confidence", "95", "--exclude", "node_modules,dotnet,.venv,build,*.egg-info,.pytest_cache,.mypy_cache"]
    require_serial: true
    exclude: (^|/)(tests/|test/|scripts/|script/)
- repo: https://github.com/codespell-project/codespell
  rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # v2.4.2
  hooks:
  - id: codespell
    args: ["-I .codespellignore"]
    exclude: \.xsd$
- repo: https://github.com/PyCQA/bandit
  rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08 # 1.9.4
  hooks:
  - id: bandit
    args: ["--skip", "B101,B404,B603"]
    exclude: ^(tests/|test/|scripts/|script/|__tests__/)
- repo: https://github.com/nbQA-dev/nbQA
  rev: d31b7eae1767c43460afb3ba130e0a6602933abe # 1.9.1
  hooks:
  - id: nbqa-ruff
    args: ["--fix"]
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 659a7789596d520c849e9c96525119e9fbaa731f # 0.11.8
  hooks:
  - id: uv-lock
- repo: local
  hooks:
  - id: concept-registry-parity
    name: concept ids exist in the agent-utilities registry
    entry: pytest -q tests/test_concept_parity.py
    language: system
    pass_filenames: false
    always_run: true
  - id: mermaid-fence-check
    name: mermaid fenced-block structure
    entry: python scripts/check_mermaid_blocks.py
    language: python
    types: [markdown]
    pass_filenames: true
    exclude: .*universal_skills/research/comparative-analysis/references/report_template\.md$
  - id: readme-deploy-block
    name: agents/* README reference the agent-os-genesis deploy block
    entry: python3 scripts/inject_package_deploy_readme.py --check
    language: system
    pass_filenames: false
    always_run: true
  - id: check-agent-standards
    name: check agent standards
    entry: |-
      bash -c 'for f in $(find . -type f -name "agent_server.py" -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do grep -q "warnings.filterwarnings" "$f" && grep -q "file=sys.stderr" "$f" || { echo "Missing warnings.filterwarnings or file=sys.stderr in $f"; exit 1; }; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-cli-help
    name: check cli help
    entry: |-
      bash -c 'for f in $(find . -type f \( -name "mcp_server.py" -o -name "agent_server.py" \) -not -path "*/\.venv/*" -not -path "*/__pycache__/*"); do mod=$(echo "$f" | sed -e "s/^\.\///" -e "s/\.py$//" -e "s/\//./g"); uv run python -m "$mod" --help >/dev/null || exit 1; done'
    language: system
    pass_filenames: false
    always_run: true
  - id: check-bumpversion
    name: validate bumpversion config
    entry: |-
      bash -c 'if [ -f ".bumpversion.cfg" ]; then bump2version patch --dry-run --allow-dirty; fi'
    language: system
    pass_filenames: false
    always_run: true
- repo: local
  hooks:
  - id: pytest
    name: pytest
    entry: bash -c 'test_target="tests"; for d in tests/unit test/unit tests test; do if [ -d "$d" ]; then test_target="$d"; break; fi; done; if [ -f uv.lock ]; then uv run --all-extras pytest "$test_target" -q --tb=short -m "not slow" --timeout=60; else pytest "$test_target" -q --tb=short -m "not slow" --timeout=60; fi'
    language: system
    types: [python]
    pass_filenames: false
    always_run: true
- repo: local
  hooks:
  - id: security-sanitizer
    name: Security and Garbage Sanitizer
    entry: python scripts/security_sanitizer.py
    language: python
    pass_filenames: false
    always_run: true
- repo: local
  hooks:
  - id: check-path-portability
    name: cross-platform path portability
    entry: python scripts/check_path_portability.py . --max-path 200 --max-name 100 --max-violations 0
    language: system
    pass_filenames: false
    always_run: true
- repo: local
  hooks:
  - id: check-atomicity
    name: atomicity edict (atomic skills + dual-mode workflows)
    entry: python scripts/check_atomicity.py
    language: system
    pass_filenames: false
    always_run: true
- repo: local
  hooks:
  - id: skill-catalog-structure
    name: skill catalog structural integrity
    entry: python universal_skills/agent-tools/skill-catalog-auditor/scripts/audit_catalog.py universal_skills --fail-on error
    language: system
    pass_filenames: false
    always_run: true
- repo: local
  hooks:
  - id: check-frontmatter-portability
    name: cross-agent frontmatter portability (Codex + fleet)
    entry: |-
      bash -c 'roots="universal_skills"; for d in ../skill-graphs/skill_graphs ../../agent-utilities/agent_utilities/skills ../../agents; do [ -d "$d" ] && roots="$roots $d"; done; python3 scripts/check_frontmatter_portability.py $roots --max-violations 0'
    language: system
    pass_filenames: false
    always_run: true
