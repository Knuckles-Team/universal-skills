exclude: ^(.*\/scripts\/|.*skill_graphs\/|.*pnpm-lock\.yaml|.*uv\.lock|.*\.db$|.*\.bak$|.*\.sqlite$)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=2000"]
        exclude: ^uv\.lock$|.*\.db$|.*\.bak$|.*\.sqlite$
      - id: check-ast
        exclude: (^|/)(tests/|test/|scripts/|script/)
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: fix-byte-order-marker
        exclude: .gitignore
      - id: check-merge-conflict
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: no-commit-to-branch
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        name: ruff check
        args: ["--fix", "--ignore=E402"]
        exclude: (^|/)(tests/|test/|scripts/|script/)
      - id: ruff-format
        name: ruff format
        exclude: (^|/)(tests/|test/|scripts/|script/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--follow-imports=silent", "--show-column-numbers", "--no-error-summary", "--no-pretty"]
        exclude: (^|/)(tests/|test/|scripts/|script/)
        additional_dependencies: ["types-PyYAML", "types-requests", "types-setuptools", "types-toml"]
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        pass_filenames: false
        args: [ ".", "--min-confidence", "95", "--exclude", "node_modules,dotnet,.venv" ]
        require_serial: true
        exclude: (^|/)(tests/|test/|scripts/|script/)
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["-I .codespellignore"]
        exclude: \.xsd$
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["--skip", "B101,B404,B603"]
        exclude: ^(tests/|test/|scripts/|script/|__tests__/)
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        args: ["--fix"]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.7
    hooks:
      - id: uv-lock
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'if [ -f uv.lock ]; then uv run --extra test pytest -v -s; else pytest -v -s; fi'
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
